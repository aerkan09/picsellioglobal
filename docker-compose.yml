# Picsellio – Hetzner / production Docker Compose
# Sunucuda: /opt/picsellioglobal (veya proje adı), cp .env.example .env ve doldurun.
# Nginx: SSL yoksa devops/nginx/nginx.conf.http-only dosyasını nginx.conf olarak kopyalayın.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-picsellio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD gerekli}
      POSTGRES_DB: ${POSTGRES_DB:-picsellio}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-picsellio} -d ${POSTGRES_DB:-picsellio}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-picsellio}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-picsellio}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-Admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      # Aşağıdakileri .env veya ortamdan verin
      SHOPIER_API_KEY: ${SHOPIER_API_KEY:-}
      SHOPIER_API_SECRET: ${SHOPIER_API_SECRET:-}
      SHOPIER_CALLBACK_URL: ${SHOPIER_CALLBACK_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      PHOTOROOM_API_KEY: ${PHOTOROOM_API_KEY:-}
      STABILITY_API_KEY: ${STABILITY_API_KEY:-}
      GOOGLE_VISION_API_KEY: ${GOOGLE_VISION_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
    volumes:
      - backend_uploads:/app/public/uploads
    expose:
      - "4000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Production'da kendi API adresinizi yazın (tarayıcı bu adrese istek atar)
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./devops/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    # SSL yoksa 443 mount etmeyin veya nginx.conf.http-only kullanın (sadece 80)

volumes:
  postgres_data:
  backend_uploads:
